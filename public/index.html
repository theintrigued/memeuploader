<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClipVault</title>
  <style>
    :root {
      --bg: #0b0b0f;
      --card: #16161d;
      --border: #26262f;
      --text: #f2f2f5;
      --muted: #9a9aa5;
      --accent: #8b5cf6;
      --accent2: #22d3ee;
      --green: #34d399;
      --red: #f87171;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #1a1024 0%, var(--bg) 55%);
      color: var(--text);
      max-width: 480px;
      margin: 0 auto;
      padding: 28px 18px 60px;
      min-height: 100vh;
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      margin: 0 0 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }
    .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 22px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; }
    input, textarea, select {
      width: 100%;
      font-size: 15px;
      padding: 12px;
      margin-bottom: 14px;
      background: #0f0f14;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
    }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
    textarea { resize: vertical; }
    .row-tight { margin-bottom: 4px; }
    button {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:active { opacity: 0.8; }
    button:disabled { opacity: 0.5; cursor: default; }
    .btn-primary { background: linear-gradient(90deg, var(--accent), var(--accent2)); color: #0b0b0f; }
    .btn-secondary { background: #1f1f28; color: var(--text); border: 1px solid var(--border); margin-bottom: 4px; }

    details { margin-bottom: 6px; }
    summary { cursor: pointer; font-size: 13px; color: var(--muted); padding: 6px 0; list-style: none; }
    summary::-webkit-details-marker { display: none; }
    summary:before { content: '▸ '; }
    details[open] summary:before { content: '▾ '; }
    details .card { margin-top: 10px; }

    .chip {
      border: 1px solid var(--border);
      background: #0f0f14;
      border-radius: 10px;
      padding: 10px 12px;
      margin-top: 8px;
      font-size: 13px;
      cursor: pointer;
    }
    .chip:active { border-color: var(--accent); }
    .chip strong { color: var(--accent2); }
    .chip .tagline { color: var(--muted); margin-top: 2px; display: block; }

    #progressWrap { display: none; }
    #progressBarOuter { width: 100%; background: #1f1f28; border-radius: 8px; height: 10px; overflow: hidden; }
    #progressBarInner { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.35s ease; }
    #stepText { font-size: 13px; margin-top: 8px; color: var(--muted); }

    .video-block { margin-top: 12px; padding: 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; background: #0f0f14; }
    .video-block strong { display: block; margin-bottom: 6px; color: var(--text); }
    .platform-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
    .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
    .badge.pending { background: #2a2a35; color: var(--muted); }
    .badge.generating, .badge.posting { background: #2a2a35; color: var(--accent2); }
    .badge.done { background: rgba(52, 211, 153, 0.15); color: var(--green); }
    .badge.error { background: rgba(248, 113, 113, 0.15); color: var(--red); }
    .badge.manual { background: rgba(34, 211, 238, 0.15); color: var(--accent2); }
    .error-detail { color: var(--red); font-size: 12px; margin-top: 2px; opacity: 0.85; }
    .download-link { display: inline-block; margin-top: 4px; font-size: 12px; color: var(--accent2); }

    .spinner {
      display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; vertical-align: -2px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .switch-row { display: flex; align-items: center; justify-content: space-between; }
    .switch { position: relative; display: inline-block; width: 46px; height: 26px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch-track { position: absolute; cursor: pointer; inset: 0; background: #2a2a35; border-radius: 26px; transition: 0.2s; }
    .switch-track:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.2s; }
    .switch input:checked + .switch-track { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    .switch input:checked + .switch-track:before { transform: translateX(20px); }
    .autopilot-stat { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .autopilot-stat b { color: var(--text); }
    .learnings-box { font-size: 12px; color: var(--muted); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); line-height: 1.5; }
  </style>
</head>
<body>
  <h1>ClipVault</h1>
  <div class="subtitle">One prompt in. Videos out, everywhere.</div>

  <div class="card">
    <label for="secret">App secret</label>
    <input id="secret" type="password" placeholder="••••••••" style="margin-bottom:0;" onchange="loadAutopilotStatus()" />
  </div>

  <div class="card" id="autopilotCard">
    <div class="switch-row">
      <div>
        <div style="font-weight:700; font-size:14px;">🤖 Autopilot</div>
        <div class="autopilot-stat" id="autopilotSummary">Enter your app secret to load status</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="autopilotToggle" onchange="toggleAutopilot()" />
        <span class="switch-track"></span>
      </label>
    </div>
    <div id="autopilotLearnings"></div>
  </div>

  <button class="btn-secondary" id="autoPickBtn" type="button" onclick="autoPick()" style="font-size:13px;">🎲 Auto-pick a saved prompt & post now</button>

  <div style="height:16px;"></div>
  <div class="subtitle" style="margin-bottom:8px;">— or generate manually —</div>

  <div style="display:flex; gap:8px;">
    <button class="btn-secondary" id="trendingBtn" type="button" onclick="loadTrending('viral')" style="margin-bottom:0; flex:1; font-size:13px; padding:12px 6px;">🔥 Trending topics</button>
    <button class="btn-secondary" id="relatableBtn" type="button" onclick="loadTrending('relatable')" style="margin-bottom:0; flex:1; font-size:13px; padding:12px 6px;">🌍 Relatable moments</button>
  </div>
  <button class="btn-secondary" id="savedBtn" type="button" onclick="loadSaved()" style="margin-top:8px; font-size:13px;">📋 Saved prompts (not yet used)</button>
  <div id="trendingList"></div>

  <div class="card" style="margin-top:16px;">
    <label for="prompt">Prompt</label>
    <textarea id="prompt" rows="3" placeholder="e.g. streamer rage quits after losing to a bot" style="margin-bottom:0;"></textarea>
  </div>

  <div class="card">
    <div class="switch-row">
      <div>
        <div style="font-weight:700; font-size:14px;">🎯 Match to existing template</div>
        <div class="autopilot-stat">Skips Insider Memes credits — picks from our own indexed library and adds text ourselves</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="templateMatchToggle" onchange="onTemplateMatchToggle()" />
        <span class="switch-track"></span>
      </label>
    </div>
    <div id="templateMatchOptions" style="display:none; margin-top:14px;">
      <label for="fontSelect">Font</label>
      <select id="fontSelect" onchange="saveTemplateMatchDefaults()"><option value="anton">Anton (Impact-style)</option></select>

      <label for="fontSizeInput">Font size (px)</label>
      <input id="fontSizeInput" type="number" min="20" max="160" value="64" onchange="saveTemplateMatchDefaults()" />

      <label for="xPosInput">Horizontal position (0 = left, 50 = center, 100 = right)</label>
      <input id="xPosInput" type="number" min="0" max="100" value="50" onchange="saveTemplateMatchDefaults()" />

      <label for="yPosInput">Vertical position (0 = top, 50 = middle, 100 = bottom)</label>
      <input id="yPosInput" type="number" min="0" max="100" value="8" style="margin-bottom:0;" onchange="saveTemplateMatchDefaults()" />
      <div class="autopilot-stat" id="templateMatchSaveStatus" style="margin-top:6px;"></div>
    </div>
  </div>

  <details>
    <summary>Advanced options</summary>
    <div class="card">
      <label for="mediaType">Media type</label>
      <select id="mediaType">
        <option value="videos" selected>Video</option>
        <option value="images">Image</option>
        <option value="all">All (mixed)</option>
      </select>

      <label for="count">Count (1–12) — every result posts to every platform</label>
      <input id="count" type="number" min="1" max="12" value="1" />

      <label for="description">Description (optional)</label>
      <textarea id="description" rows="2" placeholder="Extra context to add to the caption"></textarea>

      <label for="hashtags">Hashtags (optional)</label>
      <input id="hashtags" type="text" placeholder="#twitch #gaming #fail" style="margin-bottom:0;" />
    </div>
  </details>

  <button class="btn-primary" id="submitBtn" onclick="submitPrompt()" style="margin-top:12px;">Generate & Post</button>

  <div id="progressWrap" class="card" style="margin-top:16px;">
    <div id="progressBarOuter"><div id="progressBarInner"></div></div>
    <div id="stepText"><span class="spinner"></span>Starting...</div>
    <div id="videoList"></div>
  </div>

  <script>
    const platformNames = { youtube: 'YouTube', instagram: 'Instagram', tiktok: 'TikTok' };
    let pollTimer = null;

    function fmtTime(ms) {
      if (!ms) return null;
      return new Date(ms).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    async function loadAutopilotStatus() {
      const secret = document.getElementById('secret').value;
      const summary = document.getElementById('autopilotSummary');
      const learningsEl = document.getElementById('autopilotLearnings');
      const toggle = document.getElementById('autopilotToggle');
      if (!secret) return;
      try {
        const res = await fetch('/autopilot/status?secret=' + encodeURIComponent(secret));
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        toggle.checked = !!data.enabled;
        if (!data.date) {
          summary.textContent = data.enabled ? 'On — starts researching on the next tick' : 'Off';
        } else {
          const next = data.nextPostTime ? `next: ${fmtTime(data.nextPostTime)} "${data.nextPostTopic || ''}"` : 'no posts left today';
          summary.innerHTML = `<b>${data.postedToday}/${data.totalScheduledToday}</b> posted today · ${next}`;
        }
        learningsEl.innerHTML = data.learnings
          ? `<div class="learnings-box">🧠 ${escapeHtml(data.learnings)}</div>`
          : '';
      } catch (e) {
        summary.textContent = 'Could not load status: ' + e.message;
      }
    }

    async function toggleAutopilot() {
      const secret = document.getElementById('secret').value;
      const toggle = document.getElementById('autopilotToggle');
      const enabled = toggle.checked;
      toggle.disabled = true;
      try {
        const res = await fetch('/autopilot/toggle', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ secret, enabled }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        await loadAutopilotStatus();
      } catch (e) {
        alert('Could not toggle autopilot: ' + e.message);
        toggle.checked = !enabled; // revert on failure
      }
      toggle.disabled = false;
    }

    async function autoPick() {
      const btn = document.getElementById('autoPickBtn');
      const secret = document.getElementById('secret').value;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Picking & starting...';
      try {
        const res = await fetch('/auto-pick', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ secret }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        document.getElementById('progressWrap').style.display = 'block';
        document.getElementById('stepText').innerHTML = `<span class="spinner"></span>Auto-picked: "${escapeHtml(data.picked?.tagline || '')}"`;
        document.getElementById('progressBarInner').style.width = '0%';
        document.getElementById('videoList').innerHTML = '';
        pollJob(data.jobId);
      } catch (e) {
        alert('Auto-pick failed: ' + e.message);
      }
      btn.disabled = false;
      btn.textContent = '🎲 Auto-pick a saved prompt & post now';
    }

    // Refresh autopilot status periodically while the page is open, so the
    // switch reflects reality even if you toggled it from another device.
    setInterval(() => { if (document.getElementById('secret').value) loadAutopilotStatus(); }, 30000);

    async function onTemplateMatchToggle() {
      const on = document.getElementById('templateMatchToggle').checked;
      document.getElementById('templateMatchOptions').style.display = on ? 'block' : 'none';
      if (!on) return;

      const secret = document.getElementById('secret').value;
      if (!window._fontsLoaded) {
        try {
          const res = await fetch('/fonts');
          const data = await res.json();
          const select = document.getElementById('fontSelect');
          select.innerHTML = data.fonts.map((f) => `<option value="${f.key}">${escapeHtml(f.label)}</option>`).join('');
          window._fontsLoaded = true;
        } catch (e) { /* keep default single option */ }
      }
      if (secret) {
        try {
          const res = await fetch('/settings/template-match?secret=' + encodeURIComponent(secret));
          const data = await res.json();
          if (res.ok) {
            document.getElementById('fontSelect').value = data.font;
            document.getElementById('fontSizeInput').value = data.fontSize;
            document.getElementById('xPosInput').value = data.x;
            document.getElementById('yPosInput').value = data.y;
          }
        } catch (e) { /* fall back to whatever's already in the fields */ }
      }
    }

    async function saveTemplateMatchDefaults() {
      const secret = document.getElementById('secret').value;
      const statusEl = document.getElementById('templateMatchSaveStatus');
      if (!secret) {
        statusEl.textContent = 'Enter your app secret to save settings';
        return;
      }
      const body = {
        secret,
        font: document.getElementById('fontSelect').value,
        fontSize: document.getElementById('fontSizeInput').value,
        x: document.getElementById('xPosInput').value,
        y: document.getElementById('yPosInput').value,
      };
      try {
        const res = await fetch('/settings/template-match', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error((await res.json()).error || 'Save failed');
        statusEl.textContent = '✓ Saved as default (autopilot uses this too)';
        setTimeout(() => { statusEl.textContent = ''; }, 3000);
      } catch (e) {
        statusEl.textContent = 'Could not save: ' + e.message;
      }
    }

    function renderChips(list) {
      window._trending = list;
      const el = document.getElementById('trendingList');
      if (list.length === 0) {
        el.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0;">Nothing here yet.</div>';
        return;
      }
      el.innerHTML = list.map((s, i) => {
        const hookLine = s.newsHook ? `<span class="tagline" style="color:var(--accent2);">📰 ${escapeHtml(s.newsHook)}</span>` : '';
        return `<div class="chip" onclick="useTagline(${i})"><strong>${escapeHtml(s.topic)}</strong><span class="tagline">${escapeHtml(s.tagline)}</span>${hookLine}</div>`;
      }).join('');
    }

    async function loadTrending(mode) {
      const btn = document.getElementById(mode === 'relatable' ? 'relatableBtn' : 'trendingBtn');
      const allBtns = [document.getElementById('trendingBtn'), document.getElementById('relatableBtn'), document.getElementById('savedBtn')];
      const list = document.getElementById('trendingList');
      const secret = document.getElementById('secret').value;
      const originalLabel = btn.textContent;
      allBtns.forEach((b) => (b.disabled = true));
      btn.innerHTML = '<span class="spinner"></span>Searching...';
      list.innerHTML = '';
      try {
        const res = await fetch('/trending?secret=' + encodeURIComponent(secret) + '&mode=' + mode);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        renderChips(data.suggestions);
      } catch (e) {
        list.innerHTML = '<div style="color:var(--red);font-size:13px;padding:8px 0;">Failed to load: ' + escapeHtml(e.message) + '</div>';
      }
      allBtns.forEach((b) => (b.disabled = false));
      btn.textContent = originalLabel;
    }

    async function loadSaved() {
      const btn = document.getElementById('savedBtn');
      const allBtns = [document.getElementById('trendingBtn'), document.getElementById('relatableBtn'), document.getElementById('savedBtn')];
      const list = document.getElementById('trendingList');
      const secret = document.getElementById('secret').value;
      allBtns.forEach((b) => (b.disabled = true));
      btn.innerHTML = '<span class="spinner"></span>Loading...';
      list.innerHTML = '';
      try {
        const res = await fetch('/prompts?secret=' + encodeURIComponent(secret));
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        const unused = data.prompts.filter((p) => !p.used);
        const usedCount = data.prompts.length - unused.length;
        renderChips(unused);
        if (usedCount > 0) {
          document.getElementById('trendingList').insertAdjacentHTML(
            'beforeend',
            `<div style="color:var(--muted);font-size:12px;padding:8px 0;">${usedCount} previously used, hidden</div>`
          );
        }
      } catch (e) {
        list.innerHTML = '<div style="color:var(--red);font-size:13px;padding:8px 0;">Failed to load: ' + escapeHtml(e.message) + '</div>';
      }
      allBtns.forEach((b) => (b.disabled = false));
      btn.textContent = '📋 Saved prompts (not yet used)';
    }

    function useTagline(i) {
      window._selectedPromptId = window._trending[i].id || null;
      document.getElementById('prompt').value = window._trending[i].tagline;
      document.getElementById('prompt').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // If the person edits the prompt after picking a saved suggestion, don't
    // mark that suggestion as used — they may have changed it substantially.
    document.getElementById('prompt').addEventListener('input', () => {
      window._selectedPromptId = null;
    });

    async function submitPrompt() {
      const btn = document.getElementById('submitBtn');
      const progressWrap = document.getElementById('progressWrap');
      const secret = document.getElementById('secret').value;
      const prompt = document.getElementById('prompt').value;
      const mediaType = document.getElementById('mediaType').value;
      const count = document.getElementById('count').value;
      const description = document.getElementById('description').value;
      const hashtags = document.getElementById('hashtags').value;
      const promptId = window._selectedPromptId || null;
      const useTemplateIndex = document.getElementById('templateMatchToggle').checked;
      const textOptions = useTemplateIndex ? {
        font: document.getElementById('fontSelect').value,
        fontSize: document.getElementById('fontSizeInput').value,
        x: document.getElementById('xPosInput').value,
        y: document.getElementById('yPosInput').value,
      } : undefined;

      if (!prompt.trim()) {
        alert('Enter a prompt first.');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Working...';
      progressWrap.style.display = 'block';
      document.getElementById('stepText').innerHTML = '<span class="spinner"></span>Sending request...';
      document.getElementById('progressBarInner').style.width = '0%';
      document.getElementById('videoList').innerHTML = '';

      try {
        const res = await fetch('/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ secret, prompt, mediaType, count, description, hashtags, promptId, useTemplateIndex, textOptions }),
        });
        const data = await res.json();
        if (!res.ok) {
          document.getElementById('stepText').textContent = 'Error: ' + (data.error || 'Request failed');
          resetButton();
          return;
        }
        pollJob(data.jobId);
      } catch (e) {
        document.getElementById('stepText').textContent = 'Error: ' + e.message;
        resetButton();
      }
    }

    function resetButton() {
      const btn = document.getElementById('submitBtn');
      btn.disabled = false;
      btn.textContent = 'Generate & Post';
    }

    function pollJob(jobId) {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(async () => {
        try {
          const res = await fetch('/status/' + jobId);
          const job = await res.json();
          if (!res.ok) {
            document.getElementById('stepText').textContent = 'Error: ' + (job.error || 'Lost track of this job');
            clearInterval(pollTimer);
            resetButton();
            return;
          }
          renderJob(job);
          if (job.status === 'done' || job.status === 'error') {
            clearInterval(pollTimer);
            resetButton();
          }
        } catch (e) {
          // transient network hiccup — keep polling silently
        }
      }, 3000);
    }

    function renderJob(job) {
      const pct = job.totalSteps ? Math.round((job.completedSteps / job.totalSteps) * 100) : 0;
      document.getElementById('progressBarInner').style.width = pct + '%';
      document.getElementById('stepText').innerHTML =
        job.status === 'error'
          ? 'Error: ' + escapeHtml(job.error || 'unknown error')
          : (job.status === 'done' ? '✅ ' : '<span class="spinner"></span>') + escapeHtml(job.step) + ' (' + pct + '%)';

      const list = document.getElementById('videoList');
      list.innerHTML = job.videos.map((v, i) => {
        const rows = Object.entries(v.platforms).map(([platform, status]) => {
          const isError = status.startsWith('error');
          const isManual = status === 'manual';
          const badgeClass = isError ? 'error' : status;
          const badgeLabel = isManual ? 'manual' : (isError ? 'error' : status);
          const errorDetail = isError ? `<div class="error-detail">${escapeHtml(status.slice(7))}</div>` : '';
          const downloadLink = isManual
            ? `<div><a class="download-link" href="${v.videoUrl}" download target="_blank" rel="noopener">⬇ Download video, then open TikTok to post</a></div>`
            : '';
          return `<div><div class="platform-row"><span>${platformNames[platform] || platform}</span><span class="badge ${badgeClass}">${badgeLabel}</span></div>${errorDetail}${downloadLink}</div>`;
        }).join('');
        return `<div class="video-block"><strong>Video ${i + 1}</strong>${rows}</div>`;
      }).join('');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str ?? '';
      return div.innerHTML;
    }
  </script>
</body>
</html>
