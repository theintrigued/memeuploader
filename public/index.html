<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClipVault Poster</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; }
    input, textarea { width: 100%; font-size: 16px; padding: 10px; margin: 8px 0; box-sizing: border-box; }
    button { width: 100%; padding: 14px; font-size: 16px; background: #7c3aed; color: white; border: none; border-radius: 8px; }
    #status { margin-top: 16px; white-space: pre-wrap; font-size: 14px; }
  </style>
</head>
<body>
  <h2>ClipVault</h2>
  <input id="secret" type="password" placeholder="App secret" />
  <textarea id="prompt" rows="3" placeholder="e.g. streamer rage quits after losing to a bot"></textarea>
  <button onclick="submitPrompt()">Generate & Post</button>
  <div id="status"></div>

  <script>
    async function submitPrompt() {
      const status = document.getElementById('status');
      const secret = document.getElementById('secret').value;
      const prompt = document.getElementById('prompt').value;
      status.textContent = 'Generating video... this can take a few minutes.';
      try {
        const res = await fetch('/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ secret, prompt }),
        });
        const data = await res.json();
        status.textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        status.textContent = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
